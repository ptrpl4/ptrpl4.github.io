        <script>
            // Compute today's heliocentric longitudes and inject animation-delay
            // for each orbit so planets start at their real current positions.
            //
            // Coordinate convention:
            //   CSS orbit wrapper at top (0° rotation) → planet points north (90° helio)
            //   CCW animation → prograde motion
            //   To place planet at heliocentric longitude L (deg, CCW from vernal equinox):
            //     phase = ((L - 90 + 360) % 360) / 360
            //     delay = -(phase * animation_duration_seconds)
            (function () {
                // Days elapsed since J2000.0 (Jan 1.5, 2000 = noon UTC Jan 1 2000)
                var J2000 = Date.UTC(2000, 0, 1, 12, 0, 0);
                var d = (Date.now() - J2000) / 86400000;

                // [mean longitude at J2000 (deg), sidereal period (days), anim duration (s)]
                var planets = [
                    ["mercury",  252.2509,  87.9691,  9.64],
                    ["venus",    181.9798, 224.701,  24.62],
                    ["earth",    100.4664, 365.256,  40.00],
                    ["mars",     355.4329, 686.971,  75.28],
                    ["jupiter",   34.3515, 4332.59, 474.8],
                    ["saturn",    50.0774, 10759.22, 1179],
                    ["uranus",   314.0550, 30685.4,  3363],
                    ["neptune",  304.3487, 60190.0,  6597]
                ];

                var css = "";
                for (var i = 0; i < planets.length; i++) {
                    var p = planets[i];
                    var name = p[0], L0 = p[1], period = p[2], T = p[3];
                    var L = ((L0 + 360 * d / period) % 360 + 360) % 360;
                    var phase = ((L - 90 + 360) % 360) / 360;
                    var delay = -(phase * T);
                    css += ".orbit-" + name + "{animation-delay:" + delay.toFixed(2) + "s}";
                }

                var s = document.createElement("style");
                s.textContent = css;
                document.head.appendChild(s);
            })();
        </script>
    </head>
