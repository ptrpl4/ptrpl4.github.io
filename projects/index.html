<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Projects — ptrpl4</title>
        <meta name="description" content="Projects by Pyotr Void" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#348cb2" />

        <link rel="icon" href="../assets/favicons/favicon.svg" type="image/svg+xml" />
        <link rel="icon" href="../assets/favicons/favicon.ico" />
        <link rel="apple-touch-icon" href="../assets/favicons/apple-touch-icon.png" />
        <link rel="manifest" href="../assets/favicons/site.webmanifest" />

        <link rel="stylesheet" href="../assets/css/main.css" />

        <style>
            body {
                overflow: auto;
                min-height: 100%;
                height: auto;
                background-color: var(--bg-color);
            }

            #page {
                max-width: 640px;
                margin: 0 auto;
                padding: 4em 2em 4em;
                animation: fadeIn 0.5s forwards;
            }

            #page header {
                margin-bottom: 2.5em;
            }

            #page header h1 {
                font-size: 2em;
                font-weight: 700;
                letter-spacing: -0.03em;
                line-height: 1;
            }

            #page header p {
                margin-top: 0.5em;
                font-size: 0.9em;
                opacity: 0.6;
            }

            #page header a.back {
                display: inline-block;
                font-size: 0.8em;
                opacity: 0.6;
                border-bottom: none;
                margin-bottom: 1.5em;
                letter-spacing: 0;
            }

            #page header a.back:hover {
                opacity: 1;
            }

            #project-list {
                display: flex;
                flex-direction: column;
                gap: 0.1em;
            }

            .project-item {
                padding: 1em 0;
                border-bottom: solid 1px rgba(255, 255, 255, 0.15);
            }

            .project-item:last-child {
                border-bottom: none;
            }

            .project-name {
                font-size: 1em;
                font-weight: 400;
                border-bottom: dotted 1px;
                transition: border-color var(--animation-duration) ease-in-out;
            }

            .project-name:hover {
                border-color: transparent;
            }

            .project-live {
                font-size: 0.75em;
                opacity: 0.85;
                margin-left: 0.75em;
                vertical-align: middle;
                border-bottom: solid 1px rgba(255, 255, 255, 0.5);
            }

            .project-live:hover {
                opacity: 1;
                border-color: transparent;
            }

            .project-desc {
                font-size: 0.8em;
                opacity: 0.65;
                margin-top: 0.25em;
                line-height: 1.4;
            }

            .project-meta {
                display: flex;
                gap: 1em;
                margin-top: 0.4em;
                font-size: 0.75em;
                opacity: 0.5;
            }

            #status {
                font-size: 0.9em;
                opacity: 0.6;
            }

            @media screen and (max-width: 736px) {
                #page {
                    padding: 2.5em 1.5em 3em;
                }

                #page header h1 {
                    font-size: 1.5em;
                }
            }
        </style>
    </head>
    <body>
        <div id="page">
            <header>
                <a class="back" href="/">← ptrpl4.page</a>
                <h1>Projects</h1>
                <p>Public repositories on GitHub</p>
            </header>

            <div id="project-list">
                <p id="status">Loading…</p>
            </div>

            <noscript>
                <p>
                    Enable JavaScript to load projects, or view them directly on
                    <a href="https://github.com/ptrpl4">GitHub</a>.
                </p>
            </noscript>
        </div>

        <script>
            (function () {
                var list = document.getElementById("project-list");
                var status = document.getElementById("status");

                fetch("https://api.github.com/users/ptrpl4/repos?type=public&sort=updated&per_page=100")
                    .then(function (res) {
                        if (!res.ok) throw new Error("HTTP " + res.status);
                        return res.json();
                    })
                    .then(function (repos) {
                        status.remove();

                        if (repos.length === 0) {
                            list.innerHTML = '<p id="status">No public repositories found.</p>';
                            return;
                        }

                        var cutoff = new Date();
                        cutoff.setFullYear(cutoff.getFullYear() - 2);

                        var recent = repos.filter(function (r) {
                            return !r.archived && new Date(r.pushed_at) >= cutoff;
                        });

                        recent.forEach(function (repo) {
                            var item = document.createElement("div");
                            item.className = "project-item";

                            var meta = [];
                            if (repo.language) meta.push(repo.language);
                            if (repo.stargazers_count > 0) meta.push("★ " + repo.stargazers_count);
                            if (repo.license && repo.license.spdx_id && repo.license.spdx_id !== "NOASSERTION") meta.push(repo.license.spdx_id);

                            item.innerHTML =
                                '<a class="project-name" href="' + repo.html_url + '" target="_blank" rel="noopener">' + repo.name + "</a>" +
                                (repo.homepage ? ' <a class="project-live" href="' + repo.homepage + '" target="_blank" rel="noopener">↗ live</a>' : "") +
                                (repo.description ? '<p class="project-desc">' + repo.description + "</p>" : "") +
                                (meta.length ? '<div class="project-meta">' + meta.map(function (m) { return "<span>" + m + "</span>"; }).join("") + "</div>" : "");

                            list.appendChild(item);
                        });

                        var footer = document.createElement("p");
                        footer.id = "status";
                        footer.style.marginTop = "2em";
                        footer.innerHTML = 'All repositories on <a href="https://github.com/ptrpl4" target="_blank" rel="noopener">GitHub</a>.';
                        list.appendChild(footer);
                    })
                    .catch(function () {
                        status.textContent = "Could not load projects. View them on ";
                        var link = document.createElement("a");
                        link.href = "https://github.com/ptrpl4";
                        link.textContent = "GitHub";
                        status.appendChild(link);
                        status.appendChild(document.createTextNode("."));
                    });
            })();
        </script>
    </body>
</html>
