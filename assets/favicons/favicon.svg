<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- space background: flat dark navy matching bg #0a0e18 -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0e1520"/>
      <stop offset="100%" stop-color="#0a0e18"/>
    </radialGradient>

    <!-- earth body: dark blue base with bright blue-grey center glow,
         matching the dark theme circle-bg + inset glow look -->
    <radialGradient id="earth" cx="48%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#8aaac8"/>
      <stop offset="22%"  stop-color="#3a6090"/>
      <stop offset="55%"  stop-color="#122848"/>
      <stop offset="100%" stop-color="#060f20"/>
    </radialGradient>

    <!-- cloud/atmosphere inner glow layer -->
    <radialGradient id="clouds" cx="46%" cy="38%" r="52%">
      <stop offset="0%"  stop-color="#c8ddf0" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#7aabd8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- outer atmosphere halo -->
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="78%" stop-color="transparent"/>
      <stop offset="92%" stop-color="#3c80ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <clipPath id="pc"><circle cx="50" cy="50" r="35"/></clipPath>
  </defs>

  <!-- space -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- outer atmosphere glow -->
  <circle cx="50" cy="50" r="50" fill="url(#atmo)"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#3c6fff" stroke-width="3.5" opacity="0.18"/>

  <!-- earth body -->
  <circle cx="50" cy="50" r="35" fill="url(#earth)"/>

  <!-- cloud brightness overlay -->
  <circle cx="50" cy="50" r="35" fill="url(#clouds)" clip-path="url(#pc)"/>

  <!-- bottom dark (night side) -->
  <ellipse cx="50" cy="72" rx="26" ry="14"
           fill="#040a14" opacity="0.45" clip-path="url(#pc)"/>

  <!-- moon — small crescent upper-right, matching site's dark theme -->
  <circle cx="76" cy="20" r="7"   fill="#c8c0a8"/>
  <circle cx="79" cy="18" r="6.2" fill="#0a0e18"/>
</svg>
